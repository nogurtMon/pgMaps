services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - DSN_ENCRYPTION_KEY=${DSN_ENCRYPTION_KEY:-}
      - APP_PASSWORD=${APP_PASSWORD}
      - POSTGRES_URL=${POSTGRES_URL}
      - PORT=${PORT:-3000} # optional read from .env
    restart: unless-stopped
