services:
  app:
    image: nogurtmon/postgis-frontend:latest
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      # Passed through only when set in the host environment or .env file.
      # If unset, the image defaults apply (bundled PostgreSQL, no password, auto-generated key).
      - APP_PASSWORD
      - POSTGRES_URL
      - DSN_ENCRYPTION_KEY
      - PORT
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - app_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
