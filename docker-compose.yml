services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgis_frontend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_MAPTILER_KEY=${NEXT_PUBLIC_MAPTILER_KEY:-}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - DSN_ENCRYPTION_KEY=${DSN_ENCRYPTION_KEY:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
      - POSTGRES_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgis_frontend
      - PORT=${PORT:-3000}
    volumes:
      - app_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
