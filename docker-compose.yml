services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_MAPTILER_KEY=${NEXT_PUBLIC_MAPTILER_KEY:-}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - DSN_ENCRYPTION_KEY=${DSN_ENCRYPTION_KEY:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
      - PORT=${PORT:-3000}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - app_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
