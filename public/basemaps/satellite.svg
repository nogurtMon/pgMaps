<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <rect width="40" height="40" fill="#2d3b2a"/>
  <!-- terrain patches -->
  <rect x="0" y="0" width="18" height="16" fill="#3a4e2e"/>
  <rect x="20" y="0" width="20" height="12" fill="#2a3820"/>
  <rect x="0" y="18" width="14" height="14" fill="#4a5e3a"/>
  <rect x="16" y="22" width="12" height="10" fill="#3a4e2e"/>
  <rect x="30" y="16" width="10" height="16" fill="#2a3820"/>
  <rect x="6" y="34" width="20" height="6" fill="#3a4e2e"/>
  <!-- water -->
  <polygon points="18,10 26,6 30,14 22,18" fill="#2e4a6e"/>
  <!-- field -->
  <rect x="2" y="20" width="10" height="8" fill="#5a7040"/>
  <!-- roads -->
  <line x1="0" y1="17" x2="40" y2="17" stroke="#8a7a60" stroke-width="1.5"/>
  <line x1="19" y1="0" x2="19" y2="40" stroke="#8a7a60" stroke-width="1"/>
